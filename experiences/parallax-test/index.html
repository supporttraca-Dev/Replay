<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test Micro-Parallaxe - Traça</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #webgl-container {
            width: 100%;
            height: 100%;
            display: block;
        }
        #ui-layer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="webgl-container"></div>
    <div id="ui-layer">
        <h3>Test Micro-Parallaxe (Effet Diorama)</h3>
        <p>Bouge ta souris pour voir l'effet de profondeur.</p>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
